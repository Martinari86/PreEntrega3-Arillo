<body id="cuerpoContacto">

            <nav class="header__menu">

    <main id="mainContacto">
        <article class="mainContacto__articulo1">
            <p class="mainContacto-articulo1__texto">Dudas, Sugerencias o Reclamos ?</p>
        </article>
        
        <article class="mainContacto__articulo2">
            <!-- Iria Formulario-->
           <form class="mainContacto-articulo2__formulario">
                <div class="mainContacto-articulo2-formulario__linea1">
                    <label class="mainContacto-articulo2-formulario-linea1__etiqueta1"> Nombre </label>
                    <input class="mainContacto-articulo2-formulario-linea1__input1" type="text">
                </div>
                <div class="mainContacto-articulo2-formulario__linea2">
                    <label class="mainContacto-articulo2-formulario-linea1__etiqueta2"> Apellido </label>

                <div class="mainContacto-articulo2-formulario__linea3">    
                    <label class="mainContacto-articulo2-formulario-linea1__etiqueta3"> Telefono </label>
                    <input class="mainContacto-articulo2-formulario-linea1__input3" type="number">
                </div>    
                <div class="mainContacto-articulo2-formulario__linea4">    
                    <label class="mainContacto-articulo2-formulario-linea1__etiqueta4"> Mail </label>
                    <input class="mainContacto-articulo2-formulario-linea1__input4" type="email">
                </div>    
                <div class="mainContacto-articulo2-formulario__linea5">    
                    <label class="mainContacto-articulo2-formulario-linea1__etiqueta5">Comentarios</label>
                    <textarea class="mainContacto-articulo2-formulario-linea1__input5" name="Comentarios" id="comentario" cols="30" rows="10"></textarea>
                </div>
            </form>   
        </article>
